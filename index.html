<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rose Г— Jasmine е·ҘдҪңеҫҢеҸ°</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#1a2f5e;
  --gold:#e8920a;
  --gold-light:#f5a623;
  --navy-light:#2a4080;
  --bg:#ffffff;
  --card-bg:#fff;
  --border:#dde3ef;
  --text:#1a1a2e;
  --muted:#7a8aaa;
  --peter:#2a4080;
  --peter-bg:#eef2fb;
  --done:#1a7a4a;
  --done-bg:#edfaf3;
  --wip:#c05a10;
  --wip-bg:#fff4ee;
  --todo:#888;
  --todo-bg:#f8f8f8;
  --header-bg:#fdf8f0;
  --header-border:#e8920a;
  --font:'PingFang TC','-apple-system','Microsoft JhengHei',sans-serif;
}
body{font-family:var(--font);background:var(--bg);overflow:hidden;height:100vh;user-select:none;}

/* в”Җв”Җ TOPBAR в”Җв”Җ */
#topbar{
  position:fixed;top:0;left:0;right:0;height:48px;
  background:var(--navy);z-index:1000;
  display:flex;align-items:center;gap:8px;padding:0 12px;
  box-shadow:0 2px 8px rgba(0,0,0,.18);
}
#topbar .logo{color:var(--gold);font-size:18px;font-weight:900;letter-spacing:1px;margin-right:4px;}
#site-title{
  color:#fff;font-size:13px;font-weight:700;padding:3px 8px;border-radius:5px;
  border:1.5px solid transparent;outline:none;min-width:60px;background:transparent;cursor:text;
  font-family:var(--font);
}
#site-title:focus{border-color:var(--gold);background:rgba(255,255,255,.1);}
.tsep{width:1px;height:24px;background:rgba(255,255,255,.2);margin:0 4px;}
.tbtn{
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
  color:#fff;border-radius:6px;padding:5px 11px;font-size:12px;cursor:pointer;
  font-family:var(--font);transition:all .15s;white-space:nowrap;
}
.tbtn:hover{background:rgba(255,255,255,.2);}
.tbtn.active{background:var(--gold);border-color:var(--gold);color:#fff;}
.tbtn.pri{background:var(--gold);border-color:var(--gold-light);color:#fff;font-weight:700;}
.tbtn.pri:hover{background:var(--gold-light);}
#zdsp{color:rgba(255,255,255,.7);font-size:12px;min-width:36px;text-align:center;}
#board-tabs{display:flex;align-items:center;gap:4px;}
.btab{
  display:flex;align-items:center;gap:4px;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);
  border-radius:6px;padding:4px 10px;cursor:pointer;color:rgba(255,255,255,.8);
  font-size:12px;transition:all .15s;
}
.btab:hover{background:rgba(255,255,255,.2);}
.btab.active{background:var(--gold);border-color:var(--gold-light);color:#fff;font-weight:700;}
.btab-name{outline:none;background:transparent;border:none;color:inherit;font-size:12px;font-family:var(--font);cursor:pointer;min-width:40px;}
.btab-del{color:rgba(255,255,255,.4);cursor:pointer;font-size:14px;line-height:1;padding:0 2px;}
.btab-del:hover{color:#ff6b6b;}
.btab-add{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.7);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:16px;}
.btab-add:hover{background:rgba(255,255,255,.2);}

/* в”Җв”Җ SYMBAR в”Җв”Җ */
#symbar{
  position:fixed;top:48px;left:0;right:0;height:40px;
  background:#f0f4ff;border-bottom:1.5px solid var(--border);
  z-index:999;display:flex;align-items:center;gap:6px;padding:0 12px;
}
.sbtn{
  background:#fff;border:1px solid var(--border);color:var(--navy);
  border-radius:5px;padding:4px 10px;font-size:12px;cursor:pointer;
  font-family:var(--font);transition:all .15s;white-space:nowrap;
}
.sbtn:hover{border-color:var(--navy);background:#eef2fb;}
.sbtn.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.sbtn.danger{color:#c00;border-color:#fcc;}
.sbtn.danger:hover{background:#fff0f0;}
.ssep{width:1px;height:20px;background:var(--border);margin:0 2px;}
.lc-dot{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;}
.lc-dot.active-lc,.lc-dot:hover{border-color:var(--navy);transform:scale(1.2);}
#conn-hint{font-size:11px;color:var(--gold);font-weight:700;display:none;margin-left:4px;}

/* в”Җв”Җ VIEWPORT в”Җв”Җ */
#vp{
  position:fixed;top:88px;left:0;right:0;bottom:0;
  overflow:hidden;background:#f7f9ff;
  background-image:radial-gradient(circle,#c8d4f0 1px,transparent 1px);
  background-size:28px 28px;cursor:default;
}
#world{position:absolute;transform-origin:0 0;}
#lines{position:absolute;top:0;left:0;width:20000px;height:20000px;pointer-events:none;overflow:visible;}
#lines path,#lines line{pointer-events:stroke;}
#selbox{position:absolute;border:1.5px dashed var(--navy);background:rgba(26,47,94,.06);pointer-events:none;display:none;}

/* в”Җв”Җ CARD в”Җв”Җ */
.card{
  position:absolute;background:var(--card-bg);
  border:1.5px solid var(--border);border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.07);
  min-width:180px;padding:0;overflow:visible;
  transition:box-shadow .15s;
}
.card:hover{box-shadow:0 4px 16px rgba(26,47,94,.13);}
.card.selected-card{outline:2px solid var(--gold);outline-offset:2px;}
.card.conn-source{outline:2px solid var(--navy);outline-offset:2px;box-shadow:0 0 0 4px rgba(26,47,94,.15);}
.card-hdr{
  display:flex;align-items:center;gap:6px;padding:8px 10px 6px;
  border-bottom:1px solid var(--border);border-radius:10px 10px 0 0;
  background:#f8faff;
}
.card.peter .card-hdr{background:var(--peter-bg);}
.card.done .card-hdr{background:var(--done-bg);}
.card.wip .card-hdr{background:var(--wip-bg);}
.card.header .card-hdr{background:var(--header-bg);border-bottom-color:var(--gold);}
.card-collapse{background:none;border:none;cursor:pointer;font-size:13px;color:var(--muted);padding:0;line-height:1;transition:transform .2s;}
.card-collapse.collapsed{transform:rotate(-90deg);}
.card-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:.5px;}
.card.peter .card-badge{background:var(--peter-bg);color:var(--peter);}
.card.done .card-badge{background:var(--done-bg);color:var(--done);}
.card.wip .card-badge{background:var(--wip-bg);color:var(--wip);}
.card.todo .card-badge{background:var(--todo-bg);color:var(--todo);}
.card.header .card-badge{background:#fdf0d8;color:var(--gold);}
.status-pill{font-size:10px;padding:2px 7px;border-radius:10px;cursor:pointer;font-weight:600;}
.st-done{background:var(--done-bg);color:var(--done);}
.st-wip{background:var(--wip-bg);color:var(--wip);}
.st-todo{background:var(--todo-bg);color:var(--todo);}
.card-del{background:none;border:none;cursor:pointer;font-size:13px;color:#ccc;padding:0 2px;line-height:1;display:none;margin-left:auto;}
.card:hover .card-del{display:block;}
.card-del:hover{color:#e05;}
.card-body-wrap{padding:8px 10px 10px;}
.card-body-wrap.collapsed{display:none;}
.card-title-el{
  width:100%;border:none;outline:none;resize:none;background:transparent;
  font-size:13px;font-weight:700;color:var(--text);line-height:1.4;
  font-family:var(--font);padding:0;overflow:hidden;
}
.card-body-el{
  width:100%;border:none;outline:none;resize:none;background:transparent;
  font-size:12px;color:#444;line-height:1.6;
  font-family:var(--font);padding:0;margin-top:4px;overflow:hidden;
}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:6px;}
.edit-btn{background:none;border:1px solid var(--border);border-radius:4px;font-size:11px;padding:2px 7px;cursor:pointer;color:var(--muted);font-family:var(--font);}
.edit-btn:hover{border-color:var(--navy);color:var(--navy);}
.rh{position:absolute;bottom:3px;right:3px;width:14px;height:14px;cursor:nwse-resize;opacity:.4;}
.rh:hover{opacity:.8;}

/* в”Җв”Җ HEADING BLOCKS в”Җв”Җ */
.h1-block{font-size:20px;font-weight:800;color:var(--navy);line-height:1.3;margin-bottom:4px;width:100%;border:none;outline:none;background:transparent;font-family:var(--font);resize:none;}
.h2-block{font-size:16px;font-weight:700;color:var(--navy-light);line-height:1.3;margin-bottom:3px;width:100%;border:none;outline:none;background:transparent;font-family:var(--font);resize:none;}
.h3-block{font-size:13px;font-weight:700;color:var(--muted);line-height:1.3;margin-bottom:2px;width:100%;border:none;outline:none;background:transparent;font-family:var(--font);resize:none;}

/* в”Җв”Җ SLASH MENU в”Җв”Җ */
#slash-menu{
  position:fixed;background:#fff;border:1.5px solid var(--border);
  border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);
  z-index:9999;padding:4px 0;min-width:180px;display:none;
}
.slash-item{padding:8px 14px;cursor:pointer;font-size:13px;color:var(--text);display:flex;align-items:center;gap:8px;}
.slash-item:hover{background:var(--peter-bg);color:var(--navy);}
.slash-item .si-label{font-weight:700;}
.slash-item .si-desc{font-size:11px;color:var(--muted);}

/* в”Җв”Җ RIGHT-CLICK MENU в”Җв”Җ */
#ctx-menu{
  position:fixed;background:#fff;border:1.5px solid var(--border);
  border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);
  z-index:9998;padding:4px 0;min-width:160px;display:none;
}
.ctx-item{padding:8px 14px;cursor:pointer;font-size:13px;color:var(--text);}
.ctx-item:hover{background:var(--peter-bg);color:var(--navy);}
.ctx-sep{height:1px;background:var(--border);margin:3px 0;}
.ctx-sub{font-size:11px;color:var(--muted);padding:4px 14px 2px;}

/* в”Җв”Җ ARROW RIGHT-CLICK MENU в”Җв”Җ */
#arrow-menu{
  position:fixed;background:#fff;border:1.5px solid var(--border);
  border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);
  z-index:9997;padding:4px 0;min-width:180px;display:none;
}
.arrow-item{padding:7px 14px;cursor:pointer;font-size:12px;color:var(--text);}
.arrow-item:hover{background:var(--peter-bg);}

/* в”Җв”Җ TEXT BLOCK в”Җв”Җ */
.free-text{
  position:absolute;min-width:60px;min-height:24px;
}
.free-text textarea{
  background:transparent;border:none;outline:none;resize:none;
  font-family:var(--font);line-height:1.5;padding:2px 4px;
  min-width:60px;min-height:24px;
}
.free-text .ft-del{
  position:absolute;top:-16px;right:0;font-size:12px;cursor:pointer;
  color:#e05;display:none;background:#fff;border:1px solid #fcc;
  border-radius:50%;width:16px;height:16px;line-height:16px;text-align:center;
}
.free-text:hover .ft-del{display:block;}
.free-text .ft-resize{position:absolute;bottom:0;right:0;width:10px;height:10px;cursor:nwse-resize;opacity:.3;}
.free-text:hover .ft-resize{opacity:.7;}

/* в”Җв”Җ MODAL в”Җв”Җ */
#ov{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:2000;display:none;align-items:center;justify-content:center;}
#ov.on{display:flex;}
#modal{background:#fff;border-radius:14px;width:560px;max-width:94vw;max-height:88vh;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:12px;box-shadow:0 20px 60px rgba(0,0,0,.15);}
#modal h3{font-size:14px;color:var(--navy);font-weight:800;}
.mf label{font-size:11px;color:var(--muted);display:block;margin-bottom:4px;font-weight:600;}
.mf input,.mf textarea,.mf select{width:100%;border:1.5px solid var(--border);border-radius:7px;padding:8px 10px;font-size:13px;font-family:var(--font);outline:none;color:var(--text);}
.mf input:focus,.mf textarea:focus,.mf select:focus{border-color:var(--navy);}
.modal-btns{display:flex;gap:8px;flex-wrap:wrap;}
.mb{padding:8px 18px;border-radius:7px;font-size:13px;cursor:pointer;font-family:var(--font);border:1.5px solid var(--border);}
.mb.s{background:var(--navy);color:#fff;border-color:var(--navy);}
.mb.s:hover{background:var(--navy-light);}
.mb.c{background:#fff;color:var(--text);}
.mb.c:hover{background:#f5f5f5;}

/* в”Җв”Җ LEGEND в”Җв”Җ */
#legend{position:fixed;bottom:16px;left:16px;background:rgba(255,255,255,.95);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:11px;z-index:500;box-shadow:0 2px 8px rgba(0,0,0,.08);}
#legend h4{color:var(--navy);font-size:10px;font-weight:800;margin-bottom:6px;letter-spacing:.5px;}
.leg-row{display:flex;align-items:center;gap:6px;margin-bottom:3px;color:var(--text);}
.leg-dot{width:12px;height:12px;border-radius:3px;border:1.5px solid;}

/* в”Җв”Җ CONN PORT в”Җв”Җ */
.conn-port{position:absolute;width:10px;height:10px;border-radius:50%;background:var(--gold);border:2px solid #fff;opacity:0;transition:opacity .15s;cursor:crosshair;z-index:10;}
.card:hover .conn-port{opacity:1;}
.conn-port.port-t{top:-5px;left:50%;transform:translateX(-50%);}
.conn-port.port-b{bottom:-5px;left:50%;transform:translateX(-50%);}
.conn-port.port-l{left:-5px;top:50%;transform:translateY(-50%);}
.conn-port.port-r{right:-5px;top:50%;transform:translateY(-50%);}
</style>
</head>
<body>

<script>
// в•җв•җ STATE в•җв•җ
let scale=.65,tx=80,ty=60;
let isPanning=false,panSX=0,panSY=0,panTX=0,panTY=0;
let dragging=null,dOffX=0,dOffY=0;
let resizing=null,rX=0,rY=0,rW=0,rH=0;
let ftResizing=null,ftRX=0,ftRY=0,ftRW=0,ftRH=0;
let selMode=false,selActive=false,selSX=0,selSY=0;
let groupDragging=false,gdStartX=0,gdStartY=0,gdOrigins={};
let selectedCards=new Set(),selectedLines=new Set();
let connMode=true,connFrom=null;
let zTop=100,cardSeq=0,lineSeq=0;
let currentLineColor='#1a2f5e';
let modalTarget=null;
let slashTarget=null,slashStart=0;
let arrowMenuLineId=null;
let boards=[{id:'peter',name:'Peter зі»зөұжһ¶ж§Ӣ'},{id:'rose',name:'Rose е·ҘдҪңжқҝ'}];
let currentBoard='peter';
const boardSnapshots={};
const connections=[];

const VP=document.getElementById('vp');
const world=document.getElementById('world');
const linesEl=document.getElementById('lines');

// в•җв•җ ZOOM / PAN в•җв•җ
function applyT(){
  world.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
  document.getElementById('zdsp').textContent=Math.round(scale*100)+'%';
}
function zoomIn(){zoomAt(VP.offsetWidth/2,VP.offsetHeight/2,1.2);}
function zoomOut(){zoomAt(VP.offsetWidth/2,VP.offsetHeight/2,1/1.2);}
function zoomAt(cx,cy,d){const ns=Math.max(.1,Math.min(4,scale*d));tx=cx-(cx-tx)*ns/scale;ty=cy-(cy-ty)*ns/scale;scale=ns;applyT();}
function resetView(){scale=.65;tx=80;ty=60;applyT();}
VP.addEventListener('wheel',e=>{e.preventDefault();const r=VP.getBoundingClientRect();zoomAt(e.clientX-r.left,e.clientY-r.top,e.deltaY<0?1.1:.9);},{passive:false});

// в•җв•җ PAN в•җв•җ
VP.addEventListener('mousedown',e=>{
  if(e.button===1||(e.button===0&&e.target===VP||e.target===world||e.target.tagName==='svg'||e.target.closest('#lines'))){
    if(e.button===0&&connMode)return;
    if(e.button===0&&e.target!==VP&&e.target!==world&&!e.target.closest('#lines'))return;
    isPanning=true;panSX=e.clientX;panSY=e.clientY;panTX=tx;panTY=ty;VP.style.cursor='grabbing';
  }
});

// в•җв•җ MOUSE MOVE в•җв•җ
document.addEventListener('mousemove',e=>{
  if(isPanning){tx=panTX+(e.clientX-panSX);ty=panTY+(e.clientY-panSY);applyT();return;}
  if(dragging){
    const r=VP.getBoundingClientRect();
    if(groupDragging){
      const dx=(e.clientX-gdStartX)/scale,dy=(e.clientY-gdStartY)/scale;
      selectedCards.forEach(id=>{const el=document.getElementById(id);if(el&&gdOrigins[id]){el.style.left=(gdOrigins[id].x+dx)+'px';el.style.top=(gdOrigins[id].y+dy)+'px';}});
    } else {
      const wx=(e.clientX-r.left-tx)/scale,wy=(e.clientY-r.top-ty)/scale;
      dragging.style.left=(wx-dOffX)+'px';dragging.style.top=(wy-dOffY)+'px';
    }
    __drawLines();return;
  }
  if(resizing){
    const dw=e.clientX-rX,dh=e.clientY-rY;
    resizing.style.width=Math.max(160,rW+dw/scale)+'px';
    if(dh>0)resizing.style.height=Math.max(80,rH+dh/scale)+'px';
    resizing.querySelectorAll('textarea').forEach(ta=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';});
    return;
  }
  if(ftResizing){
    const dw=e.clientX-ftRX,dh=e.clientY-ftRY;
    const ta=ftResizing.querySelector('textarea');
    if(ta){ta.style.width=Math.max(60,ftRW+dw/scale)+'px';ta.style.height=Math.max(24,ftRH+dh/scale)+'px';}
    return;
  }
  if(selActive){
    const r=VP.getBoundingClientRect();
    const wx=(e.clientX-r.left-tx)/scale,wy=(e.clientY-r.top-ty)/scale;
    const sb=document.getElementById('selbox');
    const x=Math.min(selSX,wx),y=Math.min(selSY,wy),w=Math.abs(wx-selSX),h=Math.abs(wy-selSY);
    sb.style.cssText=`display:block;left:${x}px;top:${y}px;width:${w}px;height:${h}px;`;
    selectedCards.clear();
    world.querySelectorAll('.card').forEach(el=>{
      const cl=parseFloat(el.style.left),ct=parseFloat(el.style.top),cw=el.offsetWidth,ch=el.offsetHeight;
      if(cl+cw>x&&cl<x+w&&ct+ch>y&&ct<y+h){selectedCards.add(el.id);el.classList.add('selected-card');}
      else el.classList.remove('selected-card');
    });
  }
});

document.addEventListener('mouseup',e=>{
  if(isPanning){isPanning=false;VP.style.cursor='';}
  if(dragging||groupDragging){dragging=null;groupDragging=false;__drawLines();}
  if(resizing)resizing=null;
  if(ftResizing)ftResizing=null;
  if(selActive){selActive=false;document.getElementById('selbox').style.display='none';}
});

// в•җв•җ CARD в•җв•җ
const ST={
  peter:{cls:'peter',stripe:'#2a4080',pill:''},
  done:{cls:'done',stripe:'#1a7a4a',pill:'st-done',label:'вң… е·Іе®ҢжҲҗ'},
  wip:{cls:'wip',stripe:'#c05a10',pill:'st-wip',label:'рҹ”¶ йҖІиЎҢдёӯ'},
  todo:{cls:'todo',stripe:'#aaa',pill:'st-todo',label:'в¬ң жңӘй–Ӣе§Ӣ'},
  header:{cls:'header',stripe:'#e8920a',pill:''}
};

function makeCard(x,y,o){
  const id='c'+(++cardSeq);
  const base=o.base||'todo';
  const cfg=ST[base]||ST.todo;
  const w=o.width||280;
  const showPill=base!=='peter'&&base!=='header';
  const st=o.status||base;
  const stCfg=ST[st]||cfg;
  const el=document.createElement('div');
  el.className='card '+cfg.cls;
  el.id=id;el.dataset.base=base;el.dataset.status=st;
  el.style.cssText=`left:${x}px;top:${y}px;width:${w}px;z-index:${++zTop};`;
  el.innerHTML=`
    <div class="conn-port port-t" onmousedown="portDown(event,'${id}','t')"></div>
    <div class="conn-port port-b" onmousedown="portDown(event,'${id}','b')"></div>
    <div class="conn-port port-l" onmousedown="portDown(event,'${id}','l')"></div>
    <div class="conn-port port-r" onmousedown="portDown(event,'${id}','r')"></div>
    <div class="card-hdr">
      <button class="card-collapse" onclick="toggleCollapse('${id}')" title="жҠҳз–Ҡ/еұ•й–Ӣ">п№Җ</button>
      ${o.badge?`<span class="card-badge">${o.badge}</span>`:''}
      ${showPill?`<span class="status-pill ${stCfg.pill||''}" onclick="cycleStatus(this.closest('.card'))">${stCfg.label||''}</span>`:''}
      <button class="card-del" onclick="removeCard('${id}')">Г—</button>
    </div>
    <div class="card-body-wrap" id="cbw-${id}">
      <div style="padding:2px 0;">
        <textarea class="card-title-el" rows="1" placeholder="жЁҷйЎҢ">${esc(o.title||'')}</textarea>
      </div>
      <div class="card-content" id="cc-${id}"></div>
      <div class="card-footer">
        <button class="edit-btn" onclick="openModal('${id}')">рҹ“қ з·ЁијҜ</button>
      </div>
    </div>
    <div class="rh" onmousedown="rhDown(event,'${id}')">
      <svg viewBox="0 0 12 12" fill="none" stroke="#bbb" stroke-width="1.5" stroke-linecap="round"><path d="M10 2L2 10M10 6L6 10M10 10H6"/></svg>
    </div>`;
  // иЁӯеҲқе§Ӣе…§е®№
  const cc=el.querySelector(`#cc-${id}`);
  if(o.body){
    const ta=document.createElement('textarea');
    ta.className='card-body-el';ta.rows=3;ta.placeholder='е…§е®№пјҲијёе…Ҙ / жҸ’е…ҘжЁҷйЎҢпјү';ta.value=o.body;
    setupBodyTA(ta,id);
    cc.appendChild(ta);
  }
  bindCardEvents(el,id);
  world.appendChild(el);
  setTimeout(()=>autoH(el),40);
  return id;
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function autoH(el){
  el.querySelectorAll('textarea').forEach(ta=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';});
}

function setupBodyTA(ta,id){
  ta.addEventListener('mousedown',e=>e.stopPropagation());
  ta.addEventListener('input',()=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';});
  ta.addEventListener('keydown',e=>{
    if(e.key==='/'&&ta.selectionStart===ta.selectionEnd){
      const val=ta.value;const pos=ta.selectionStart;
      if(pos===0||val[pos-1]==='\n'){
        slashTarget=ta;slashStart=pos;
        showSlashMenu(e);
        e.preventDefault();
      }
    }
  });
}

function showSlashMenu(e){
  const m=document.getElementById('slash-menu');
  m.style.left=e.clientX+'px';m.style.top=(e.clientY+4)+'px';m.style.display='block';
}
function hideSlashMenu(){document.getElementById('slash-menu').style.display='none';slashTarget=null;}

function insertHeading(level){
  if(!slashTarget)return;
  hideSlashMenu();
  const card=slashTarget.closest('.card');
  if(!card)return;
  const cc=card.querySelector('.card-content');
  const ta=document.createElement('textarea');
  ta.className=`h${level}-block`;ta.rows=1;ta.placeholder=`Heading ${level}`;
  ta.addEventListener('mousedown',e=>e.stopPropagation());
  ta.addEventListener('input',()=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';});
  cc.appendChild(ta);
  setTimeout(()=>{ta.focus();ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';},50);
}

function toggleCollapse(id){
  const wrap=document.getElementById('cbw-'+id);
  const btn=document.querySelector(`#${id} .card-collapse`);
  if(!wrap)return;
  const collapsed=wrap.style.display==='none';
  wrap.style.display=collapsed?'':'none';
  if(btn)btn.classList.toggle('collapsed',!collapsed);
  __drawLines();
}

function cycleStatus(card){
  const s=card.dataset.status;
  const next={done:'wip',wip:'todo',todo:'done',peter:'peter',header:'header'};
  const ns=next[s]||'todo';
  applyStatus(card,ns);
}
function applyStatus(card,st){
  const cfg=ST[st]||ST.todo;
  card.dataset.status=st;
  card.className='card '+cfg.cls;
  const pill=card.querySelector('.status-pill');
  if(pill){pill.className='status-pill '+(cfg.pill||'');pill.textContent=cfg.label||'';}
}

function removeCard(id){
  const el=document.getElementById(id);
  if(el&&confirm('еҲӘйҷӨйҖҷејөеҚЎзүҮпјҹ')){
    el.remove();
    connections.splice(0,connections.length,...connections.filter(c=>c.from!==id&&c.to!==id));
    __drawLines();
  }
}

function rhDown(e,id){
  e.stopPropagation();const el=document.getElementById(id);
  resizing=el;rX=e.clientX;rY=e.clientY;rW=el.offsetWidth;rH=el.offsetHeight;
}

function bindCardEvents(el,id){
  el.addEventListener('mousedown',e=>{
    if(['TEXTAREA','BUTTON','INPUT','SELECT'].includes(e.target.tagName)||e.target.closest('.rh')||e.target.closest('.conn-port'))return;
    e.stopPropagation();el.style.zIndex=++zTop;
    if(connMode){clickForConn(id);return;}
    if(selectedCards.has(id)&&selectedCards.size>1){
      groupDragging=true;gdStartX=e.clientX;gdStartY=e.clientY;gdOrigins={};
      selectedCards.forEach(sid=>{const s=document.getElementById(sid);if(s)gdOrigins[sid]={x:parseFloat(s.style.left),y:parseFloat(s.style.top)};});
    } else {
      if(!e.shiftKey)clearSel();
      el.classList.add('selected-card');selectedCards.add(id);
      dragging=el;
      const r=VP.getBoundingClientRect();
      dOffX=(e.clientX-r.left-tx)/scale-parseFloat(el.style.left);
      dOffY=(e.clientY-r.top-ty)/scale-parseFloat(el.style.top);
    }
  });
  el.addEventListener('contextmenu',e=>{
    e.preventDefault();e.stopPropagation();
    showCardCtx(e,id);
  });
}

// в•җв•җ CONNECTION в•җв•җ
function toggleConnMode(){
  connMode=!connMode;connFrom=null;
  const btn=document.getElementById('conn-btn');
  const hint=document.getElementById('conn-hint');
  if(connMode){btn.classList.add('active');hint.style.display='inline';}
  else{btn.classList.remove('active');hint.style.display='none';clearConnHighlight();}
}
function clickForConn(id){
  if(!connFrom){
    connFrom=id;
    const el=document.getElementById(id);if(el)el.classList.add('conn-source');
    document.getElementById('conn-hint').textContent='еҶҚй»һз¬¬дәҢејөеҚЎзүҮе®ҢжҲҗйҖЈз·ҡ';
  } else {
    if(connFrom===id){clearConnHighlight();connFrom=null;document.getElementById('conn-hint').textContent='й»һз¬¬дёҖејөеҚЎзүҮ';return;}
    const id2='l'+(++lineSeq);
    connections.push({id:id2,from:connFrom,to:id,color:currentLineColor,style:'arrow',width:2,dash:false,label:''});
    clearConnHighlight();connFrom=null;
    document.getElementById('conn-hint').textContent='й»һз¬¬дёҖејөеҚЎзүҮ';
    __drawLines();
  }
}
function clearConnHighlight(){
  world.querySelectorAll('.conn-source').forEach(e=>e.classList.remove('conn-source'));
}
function portDown(e,id,port){
  e.stopPropagation();e.preventDefault();
  clickForConn(id);
}

function setLC(dot){
  currentLineColor=dot.dataset.c;
  document.querySelectorAll('.lc-dot').forEach(d=>d.classList.remove('active-lc'));
  dot.classList.add('active-lc');
}

function deleteSelectedLines(){
  selectedLines.forEach(id=>{
    const i=connections.findIndex(c=>c.id===id);
    if(i>-1)connections.splice(i,1);
  });
  selectedLines.clear();__drawLines();
}

// в•җв•җ DRAW LINES в•җв•җ
function getCardCenter(id){
  const el=document.getElementById(id);if(!el)return null;
  return{x:parseFloat(el.style.left)+el.offsetWidth/2,y:parseFloat(el.style.top)+el.offsetHeight/2};
}
function getCardEdgePoint(id,tx2,ty2){
  const el=document.getElementById(id);if(!el)return null;
  const cx=parseFloat(el.style.left)+el.offsetWidth/2;
  const cy=parseFloat(el.style.top)+el.offsetHeight/2;
  const dx=tx2-cx,dy=ty2-cy;
  const w=el.offsetWidth/2,h=el.offsetHeight/2;
  if(Math.abs(dx/w)>Math.abs(dy/h)){
    const sx=dx>0?1:-1;return{x:cx+sx*w,y:cy+dy*(sx*w/dx)};
  } else {
    const sy=dy>0?1:-1;return{x:cx+dx*(sy*h/dy),y:cy+sy*h};
  }
}

function _drawLines(){
  const defs=linesEl.querySelector('defs');
  linesEl.innerHTML='';if(defs)linesEl.appendChild(defs);
  connections.forEach(c=>{
    const fc=getCardCenter(c.from),tc=getCardCenter(c.to);
    if(!fc||!tc)return;
    const fp=getCardEdgePoint(c.from,tc.x,tc.y)||fc;
    const tp=getCardEdgePoint(c.to,fc.x,fc.y)||tc;
    const color=c.color||'#1a2f5e';
    const w=c.width||2;
    const dash=c.dash?`stroke-dasharray="6 4"`:'';
    const markId=`arrow-${color.replace('#','')}`;
    if(!linesEl.querySelector(`#${markId}`)){
      const defs2=linesEl.querySelector('defs')||linesEl.appendChild(document.createElementNS('http://www.w3.org/2000/svg','defs'));
      const mk=document.createElementNS('http://www.w3.org/2000/svg','marker');
      mk.id=markId;mk.setAttribute('markerWidth','8');mk.setAttribute('markerHeight','6');
      mk.setAttribute('refX','8');mk.setAttribute('refY','3');mk.setAttribute('orient','auto');
      const poly=document.createElementNS('http://www.w3.org/2000/svg','polygon');
      poly.setAttribute('points','0 0, 8 3, 0 6');poly.setAttribute('fill',color);
      mk.appendChild(poly);defs2.appendChild(mk);
    }
    const mx=(fp.x+tp.x)/2,my=(fp.y+tp.y)/2-40;
    const pathD=`M${fp.x},${fp.y} Q${mx},${my} ${tp.x},${tp.y}`;
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',pathD);
    path.setAttribute('stroke',color);path.setAttribute('stroke-width',w);
    path.setAttribute('fill','none');if(c.dash)path.setAttribute('stroke-dasharray','6 4');
    path.setAttribute('marker-end',c.style==='arrow'?`url(#${markId})`:'');
    path.setAttribute('data-lid',c.id);path.style.cursor='pointer';
    path.addEventListener('click',e=>{e.stopPropagation();selectedLines.add(c.id);});
    path.addEventListener('contextmenu',e=>{e.preventDefault();e.stopPropagation();showArrowMenu(e,c.id);});
    linesEl.appendChild(path);
    if(c.label){
      const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('x',mx);txt.setAttribute('y',my-6);
      txt.setAttribute('text-anchor','middle');txt.setAttribute('font-size','11');
      txt.setAttribute('fill',color);txt.textContent=c.label;
      linesEl.appendChild(txt);
    }
  });
}

  m.innerHTML=`
    <div class="arrow-item" onclick="arrowAddLabel()">вңҸпёҸ еңЁйҖЈзөҗдёҠеўһж·»ж–Үеӯ—</div>

      <input type="color" value="${c.color||'#1a2f5e'}" oninput="arrowColor(this.value)" style="width:24px;height:20px;margin-left:8px;vertical-align:middle;">
    </div>
    <div class="arrow-item" onclick="arrowToggleDouble()">вҶ” ${c.double?'ж”№зӮәе–®з®ӯй ӯ':'ж”№зӮәйӣҷз®ӯй ӯ'}</div>
    <div class="arrow-item" onclick="arrowToggleDash()">вҠё ${c.dash?'ж”№зӮәеҜҰз·ҡ':'ж”№зӮәиҷӣз·ҡ'}</div>
    <div class="arrow-item" onclick="arrowDelete()" style="color:#c00;">рҹ—‘ еҲӘйҷӨжӯӨйҖЈзөҗ</div>
  `;
  m.style.left=e.clientX+'px';m.style.top=e.clientY+'px';m.style.display='block';
}
function arrowAddLabel(){
  const c=connections.find(x=>x.id===arrowMenuLineId);if(!c)return;
  const t=prompt('ијёе…ҘйҖЈзөҗж–Үеӯ—пјҡ',c.label||'');
  if(t!==null){c.label=t;__drawLines();}
  hideArrowMenu();
}
function arrowColor(v){
  const c=connections.find(x=>x.id===arrowMenuLineId);if(c){c.color=v;__drawLines();}
}
function arrowToggleDouble(){
  const c=connections.find(x=>x.id===arrowMenuLineId);if(c){c.double=!c.double;c.style=c.double?'both':'arrow';__drawLines();}
  hideArrowMenu();
}
function arrowToggleDash(){
  const c=connections.find(x=>x.id===arrowMenuLineId);if(c){c.dash=!c.dash;__drawLines();}
  hideArrowMenu();
}
function arrowDelete(){
  const i=connections.findIndex(x=>x.id===arrowMenuLineId);
  if(i>-1)connections.splice(i,1);__drawLines();hideArrowMenu();
}
function hideArrowMenu(){document.getElementById('arrow-menu').style.display='none';arrowMenuLineId=null;}

// в•җв•җ TIDY UP в•җв•җ
function tidyUp(dir){
  const ids=[...selectedCards];if(ids.length<2)return;
  const els=ids.map(id=>document.getElementById(id)).filter(Boolean);
  const GAP=20;
  if(dir==='h'){
    const y0=Math.min(...els.map(e=>parseFloat(e.style.top)));
    let x=Math.min(...els.map(e=>parseFloat(e.style.left)));
    els.sort((a,b)=>parseFloat(a.style.left)-parseFloat(b.style.left));
    els.forEach(el=>{el.style.left=x+'px';el.style.top=y0+'px';x+=el.offsetWidth/scale+GAP;});
  } else if(dir==='v'){
    const x0=Math.min(...els.map(e=>parseFloat(e.style.left)));
    let y=Math.min(...els.map(e=>parseFloat(e.style.top)));
    els.sort((a,b)=>parseFloat(a.style.top)-parseFloat(b.style.top));
    els.forEach(el=>{el.style.left=x0+'px';el.style.top=y+'px';y+=el.offsetHeight/scale+GAP;});
  } else {
    const cols=Math.ceil(Math.sqrt(els.length));
    const x0=Math.min(...els.map(e=>parseFloat(e.style.left)));
    const y0=Math.min(...els.map(e=>parseFloat(e.style.top)));
    const W=Math.max(...els.map(e=>e.offsetWidth/scale));
    const H=Math.max(...els.map(e=>e.offsetHeight/scale));
    els.forEach((el,i)=>{el.style.left=(x0+(i%cols)*(W+GAP))+'px';el.style.top=(y0+Math.floor(i/cols)*(H+GAP))+'px';});
  }
  __drawLines();
}

// в•җв•җ DOUBLE CLICK = NEW CARD в•җв•җ

const boardData={};
function saveBoardSnapshot(id){
  // е…ҲжҠҠжүҖжңү textarea value еҜ«йҖІ data-valпјҢи®“ innerHTML иғҪжҠ“еҲ°
  world.querySelectorAll('textarea').forEach(ta=>{ta.setAttribute('data-val',ta.value);});
  boardData[id]={html:world.innerHTML.replace(/<svg id="lines".*?<\/svg>/s,''),conns:JSON.parse(JSON.stringify(connections))};
}
function restoreBoard(id){
  const d=boardData[id];
  world.innerHTML='<svg id="lines"><defs></defs></svg>';
  const linesNew=world.querySelector('#lines');
  if(d){
    world.insertAdjacentHTML('beforeend',d.html);
    connections.length=0;d.conns.forEach(c=>connections.push(c));
  }
  // йӮ„еҺҹ textarea value
  world.querySelectorAll('textarea[data-val]').forEach(ta=>{
    ta.value=ta.getAttribute('data-val');
    ta.removeAttribute('data-val');
    ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';
  });
  world.querySelectorAll('.card').forEach(el=>bindCardEvents(el,el.id));
  const lOld=document.getElementById('lines');
  if(lOld!==linesNew){linesEl2=linesNew;}
}

function switchBoard(id){
  if(id===currentBoard)return;
  saveBoardSnapshot(currentBoard);
  saveLocalData();
  currentBoard=id;renderTabs();
  selectedCards.clear();selectedLines.clear();connFrom=null;
  world.innerHTML='<svg id="lines"><defs></defs></svg>';
  // reassign linesEl
  window._linesEl=world.querySelector('#lines');
  connections.length=0;
  const d=boardData[id];
  if(d){
    world.insertAdjacentHTML('beforeend',d.html);
    d.conns.forEach(c=>connections.push(c));
    // йӮ„еҺҹ textarea value
    world.querySelectorAll('textarea[data-val]').forEach(ta=>{
      ta.value=ta.getAttribute('data-val');
      ta.removeAttribute('data-val');
      ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';
    });
    world.querySelectorAll('.card').forEach(el=>bindCardEvents(el,el.id));
  } else {
    if(id==='peter')buildPeter();
    else buildRose();
  }
  _drawLines();
}

// linesEl pointer вҖ” йңҖиҰҒеңЁswitchBoardеҫҢжӣҙж–°
function __drawLines(){
  const le=world.querySelector('#lines')||linesEl;
  const defs=le.querySelector('defs');
  le.innerHTML='';if(defs)le.appendChild(defs);
  connections.forEach(c=>{
    const fc=_getCenter(c.from),tc=_getCenter(c.to);if(!fc||!tc)return;
    const fp=_getEdge(c.from,tc.x,tc.y)||fc;
    const tp=_getEdge(c.to,fc.x,fc.y)||tc;
    const color=c.color||'#1a2f5e';
    const markId=`mk-${color.replace('#','')}`;
    let defs2=le.querySelector('defs');if(!defs2){defs2=document.createElementNS('http://www.w3.org/2000/svg','defs');le.appendChild(defs2);}
    if(!le.querySelector(`#${markId}`)){
      const mk=document.createElementNS('http://www.w3.org/2000/svg','marker');
      mk.id=markId;mk.setAttribute('markerWidth','8');mk.setAttribute('markerHeight','6');
      mk.setAttribute('refX','8');mk.setAttribute('refY','3');mk.setAttribute('orient','auto');
      const poly=document.createElementNS('http://www.w3.org/2000/svg','polygon');
      poly.setAttribute('points','0 0, 8 3, 0 6');poly.setAttribute('fill',color);
      mk.appendChild(poly);defs2.appendChild(mk);
    }
    const mx=(fp.x+tp.x)/2,my=(fp.y+tp.y)/2-Math.min(80,Math.abs(tp.x-fp.x)*0.3);
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',`M${fp.x},${fp.y} Q${mx},${my} ${tp.x},${tp.y}`);
    path.setAttribute('stroke',color);path.setAttribute('stroke-width',c.width||2);
    path.setAttribute('fill','none');
    if(c.dash)path.setAttribute('stroke-dasharray','6 4');
    path.setAttribute('marker-end',c.style!=='none'?`url(#${markId})`:'');
    if(c.double)path.setAttribute('marker-start',`url(#${markId})`);
    path.setAttribute('data-lid',c.id);path.style.cursor='pointer';
    path.addEventListener('click',ev=>{ev.stopPropagation();selectedLines.add(c.id);});
    path.addEventListener('contextmenu',ev=>{ev.preventDefault();ev.stopPropagation();showArrowMenu(ev,c.id);});
    le.appendChild(path);
    if(c.label){
      const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('x',mx);txt.setAttribute('y',my-6);txt.setAttribute('text-anchor','middle');
      txt.setAttribute('font-size','11');txt.setAttribute('fill',color);txt.textContent=c.label;le.appendChild(txt);
    }
  });
}
function _getCenter(id){const el=document.getElementById(id);if(!el)return null;return{x:parseFloat(el.style.left)+el.offsetWidth/2,y:parseFloat(el.style.top)+el.offsetHeight/2};}
function _getEdge(id,tx2,ty2){
  const el=document.getElementById(id);if(!el)return null;
  const cx=parseFloat(el.style.left)+el.offsetWidth/2,cy=parseFloat(el.style.top)+el.offsetHeight/2;
  const dx=tx2-cx,dy=ty2-cy,w=el.offsetWidth/2,h=el.offsetHeight/2;
  if(Math.abs(dx/w)>Math.abs(dy/h)){const sx=dx>0?1:-1;return{x:cx+sx*w,y:cy+dy*(sx*w/(dx||1))};}
  else{const sy=dy>0?1:-1;return{x:cx+dx*(sy*h/(dy||1)),y:cy+sy*h};}
}

function renderTabs(){
  const el=document.getElementById('board-tabs');el.innerHTML='';
  boards.forEach(b=>{
    const t=document.createElement('div');t.className='btab'+(b.id===currentBoard?' active':'');
    t.innerHTML=`<span class="btab-name" contenteditable="true" spellcheck="false" onblur="renameBoard('${b.id}',this.textContent.trim())" onclick="switchBoard('${b.id}')">${b.name}</span><span class="btab-del" onclick="deleteBoard('${b.id}')">Г—</span>`;
    el.appendChild(t);
  });
  const add=document.createElement('button');add.className='btab-add';add.textContent='пјӢ';add.title='ж–°еўһзҷҪжқҝ';
  add.onclick=()=>{const n=prompt('зҷҪжқҝеҗҚзЁұпјҡ','ж–°зҷҪжқҝ');if(!n)return;const id='b'+Date.now();boards.push({id,name:n});renderTabs();switchBoard(id);};
  el.appendChild(add);
}
function renameBoard(id,name){const b=boards.find(x=>x.id===id);if(b&&name)b.name=name;}
function deleteBoard(id){
  if(boards.length<=1){alert('иҮіе°‘дҝқз•ҷдёҖеҖӢзҷҪжқҝ');return;}
  if(!confirm('еҲӘйҷӨжӯӨзҷҪжқҝпјҹ'))return;
  boards=boards.filter(b=>b.id!==id);
  if(currentBoard===id){currentBoard=boards[0].id;renderTabs();switchBoard(currentBoard);}
  else renderTabs();
}

// еӯҳеҚЎзүҮиіҮж–ҷеҲ° localStorage
function saveLocalData(){
  saveBoardSnapshot(currentBoard);
  // жҠҠжҜҸеҖӢ board зҡ„еҚЎзүҮиіҮж–ҷеәҸеҲ—еҢ–
  const allData={};
  Object.keys(boardData).forEach(bid=>{
    allData[bid]=boardData[bid];
  });
  allData[currentBoard]=boardData[currentBoard];
  localStorage.setItem('wb_data', JSON.stringify(allData));
  localStorage.setItem('wb_conns', JSON.stringify(connections));
  localStorage.setItem('wb_boards', JSON.stringify(boards));
}

// еҫһ localStorage йӮ„еҺҹ
function loadLocalData(){
  try{
    const saved=localStorage.getItem('wb_data');
    const savedBoards=localStorage.getItem('wb_boards');
    if(savedBoards){
      const b=JSON.parse(savedBoards);
      if(b&&b.length>0)boards=b;
    }
    if(saved){
      const allData=JSON.parse(saved);
      Object.keys(allData).forEach(bid=>{boardData[bid]=allData[bid];});
      return true;
    }
  }catch(e){console.log('loadLocalData error',e);}
  return false;
}

async function saveToGitHub(){
  // е…ҲеӯҳеҲ°жң¬ж©ҹ
  saveLocalData();
  const REPO='Ghjasmine/jasmine',FILE='index.html';
  let tk=localStorage.getItem('gh_tk');
  if(!tk){
    tk=prompt('и«Ӣијёе…Ҙ GitHub TokenпјҲеҸӘйңҖијёе…ҘдёҖж¬ЎпјҢжңғиЁҳеңЁйҖҷеҸ°йӣ»и…Ұпјүпјҡ');
    if(!tk){alert('жңӘијёе…Ҙ TokenпјҢеғ…е„ІеӯҳеҲ°жң¬ж©ҹ');return;}
    localStorage.setItem('gh_tk',tk);
  }
  const btn=document.querySelector('[onclick="saveToGitHub()"]');
  const orig=btn.textContent;
  btn.textContent='вҸі е„Іеӯҳдёӯ...';btn.disabled=true;
  try{
    // жҠҠжүҖжңү textarea value еҜ«йҖІ data-val
    document.querySelectorAll('textarea').forEach(ta=>{ta.setAttribute('data-val',ta.value);});
    const mr=await fetch('https://api.github.com/repos/'+REPO+'/contents/'+FILE,{
      headers:{'Authorization':'token '+tk,'Accept':'application/vnd.github.v3+json'}
    });
    if(mr.status===401){
      localStorage.removeItem('gh_tk');
      throw new Error('Token з„Ўж•ҲпјҢи«ӢйҮҚж–°ијёе…Ҙ');
    }
    const meta=await mr.json();
    const html=document.documentElement.outerHTML;
    // йӮ„еҺҹ data-valпјҲдёҚи®“ attribute з•ҷеңЁй ҒйқўдёҠпјү
    document.querySelectorAll('textarea[data-val]').forEach(ta=>{ta.removeAttribute('data-val');});
    const encoded=btoa(unescape(encodeURIComponent(html)));
    const res=await fetch('https://api.github.com/repos/'+REPO+'/contents/'+FILE,{
      method:'PUT',
      headers:{'Authorization':'token '+tk,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify({message:'update '+new Date().toISOString().slice(0,16),content:encoded,sha:meta.sha})
    });
    if(res.ok){
      btn.textContent='вң… е·Іе„Іеӯҳ';
    } else {
      throw new Error('GitHub API error '+res.status);
    }
  }catch(e){
    btn.textContent='вқҢ еӨұж•—';
    alert(e.message);
  }
  setTimeout(()=>{btn.textContent=orig;btn.disabled=false;},2500);
}
